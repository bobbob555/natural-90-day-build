<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Form Builder</title>

<style>

body{
margin:0;
font-family:system-ui;
background:radial-gradient(circle at top,#0f0f0f,#000);
color:white;
}

header{
padding:26px;
text-align:center;
font-size:24px;
font-weight:800;
}

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#080808;
padding:14px;
border-top:1px solid #222;
}

nav button{
background:none;
border:none;
color:white;
font-size:13px;
cursor:pointer;
}

.page{
display:none;
padding:26px;
padding-bottom:160px;
}

.active{
display:block;
}

.card{
background:rgba(255,255,255,0.04);
padding:24px;
border-radius:26px;
margin-bottom:24px;
backdrop-filter:blur(12px);
}

button.primary{
width:100%;
background:linear-gradient(45deg,#00ffaa,#00aaff);
border:none;
padding:16px;
border-radius:18px;
font-weight:bold;
margin-top:14px;
cursor:pointer;
}

.progressBar{
height:14px;
background:#222;
border-radius:12px;
overflow:hidden;
margin-top:12px;
}

.progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffaa,#00ccff);
transition:width .8s ease;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:14px;
border:none;
background:#181818;
color:white;
}

</style>
</head>

<body>

<header>🌌 Final Form Builder</header>

<!-- HOME DASHBOARD -->
<div id="home" class="page active">

<div class="card">
<h2>Performance Status</h2>

<p id="dayDisplay"></p>
<p id="phaseDisplay"></p>
<p id="scoreDisplay"></p>

<p id="workoutDisplay"></p>

<p style="color:#00ffaa" id="hintDisplay"></p>

<button class="primary" onclick="completeSession()">
Complete Training Session
</button>

</div>

<div class="card">
<h2>Adaptive Volume Tracking</h2>

<p>Push Performance</p>
<div class="progressBar"><div id="pushBar" class="progressFill"></div></div>

<p>Pull Performance</p>
<div class="progressBar"><div id="pullBar" class="progressFill"></div></div>

</div>

</div>

<!-- LOG PAGE -->
<div id="log" class="page">

<div class="card">
<h2>Log Training</h2>

<select id="exercise">
<option>Pushups</option>
<option>Pullups</option>
<option>Squats</option>
<option>PlankSeconds</option>
</select>

<input id="reps" type="number" placeholder="Reps or Seconds">

<button class="primary" onclick="logTraining()">Save Log</button>

</div>

</div>

<!-- WORKOUT PAGE -->
<div id="workoutPage" class="page">

<div class="card">
<h2>Generated Training</h2>
<p id="splitWorkout"></p>
</div>

</div>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('log')">Log</button>
<button onclick="showPage('workoutPage')">Workout</button>
</nav>

<script>

/* ===== CORE ===== */

let BASELINE={
pushups:40,
pullups:10
};

function getLogs(){
return JSON.parse(localStorage.getItem("logs")||"{}");
}

function saveLogs(l){
localStorage.setItem("logs",JSON.stringify(l));
}

/* ===== PHASE MODEL ===== */

function getPhase(day){

if(day<30) return "Foundation Adaptation Phase";
if(day<60) return "Growth Loading Phase";
if(day<90) return "Peak Performance Phase";

return "Maintenance Phase";
}

/* ===== WORKOUT ENGINE ===== */

function generateWorkout(day){

let workout;

if(day<30){
workout=
"Foundation Session\n"+
"3x8 Pushups\n"+
"3x6 Pullups\n"+
"3x10 Squats\n"+
"3x30s Plank";
}

else if(day<60){
workout=
"Growth Session\n"+
"3x12 Pushups\n"+
"4x8 Pullups\n"+
"3x12 Lunges\n"+
"Core Stability Work";
}

else{
workout=
"Peak Session\n"+
"Backpack Pushups\n"+
"Controlled Pullups\n"+
"Explosive Movement Training";
}

localStorage.setItem("workout",workout);
splitWorkout.innerText=workout;
}

/* ===== PERFORMANCE SCORE ===== */

function calculateScore(){

let logs=getLogs();

let push=logs["Pushups"]||0;
let pull=logs["Pullups"]||0;

return Math.floor(
(push/BASELINE.pushups)*50 +
(pull/BASELINE.pullups)*50
);
}

/* ===== SESSION COMPLETE ===== */

function completeSession(){

let day=parseInt(localStorage.getItem("day")||"1");
day++;

localStorage.setItem("day",day);

if(day%7===0){
generateChallenge();
}

loadUI();
}

/* ===== TRAINING LOG ===== */

function logTraining(){

let ex=exercise.value;
let reps=parseInt(reps.value);

if(!reps) return;

let logs=getLogs();
logs[ex]=(logs[ex]||0)+reps;

saveLogs(logs);

updateBars();
alert("Logged!");
}

/* ===== VISUALIZATION ===== */

function updateBars(){

let logs=getLogs();

let push=logs["Pushups"]||0;
let pull=logs["Pullups"]||0;

pushBar.style.width=Math.min(push/BASELINE.pushups*100,100)+"%";
pullBar.style.width=Math.min(pull/BASELINE.pullups*100,100)+"%";

}

/* ===== CHALLENGES ===== */

function generateChallenge(){

let list=[
"🔥 50 pushups today",
"🔥 20 pullups today",
"🔥 2 minute plank",
"🔥 Sprint interval work",
"🔥 Jump training practice"
];

localStorage.setItem(
"hint",
list[Math.floor(Math.random()*list.length)]
);
}

/* ===== UI ===== */

function loadUI(){

let day=localStorage.getItem("day")||1;

dayDisplay.innerText="Day "+day+"/90";
phaseDisplay.innerText=getPhase(day);

workoutDisplay.innerText=localStorage.getItem("workout");

scoreDisplay.innerText="Performance Score: "+calculateScore();

hintDisplay.innerText=localStorage.getItem("hint")||"";

generateWorkout(day);

}

function showPage(page){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(page).classList.add("active");
}

window.onload=loadUI;

</script>

</body>
</html>
